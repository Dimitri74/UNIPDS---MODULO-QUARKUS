quarkus.datasource.db-kind=mysql
quarkus.datasource.username=${DB_USER:quarkus}
quarkus.datasource.password=${DB_PASSWORD:quarkus}
quarkus.datasource.jdbc.url=jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/chaves_food?createDatabaseIfNotExist=true
quarkus.datasource.reactive.url=mysql://${DB_HOST:localhost}:${DB_PORT:3306}/chaves_food
quarkus.datasource.devservices.enabled=false

quarkus.hibernate-orm.database.generation=none
quarkus.http.port=8081

# Flyway settings
quarkus.flyway.migrate-at-start=true
