services:
  mysql:
    image: mysql:9.5
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: chaves_food
      MYSQL_USER: quarkus
      MYSQL_PASSWORD: quarkus
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uquarkus", "-pquarkus"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  mysql_data:

