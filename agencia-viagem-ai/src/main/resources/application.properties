# quarkus.langchain4j.easy-rag.path=src/main/resources/rag
# quarkus.langchain4j.easy-rag.max-segment-size=100
# quarkus.langchain4j.easy-rag.max-overlap-size=20

# Perfil opcional para ativar pgvector sem quebrar o fluxo atual padrao.
# Execute com: .\mvnw.cmd -Ppgvector quarkus:dev -Dquarkus.profile=pgvector
%pgvector.quarkus.datasource.db-kind=postgresql
%pgvector.quarkus.datasource.username=${PGVECTOR_DB_USERNAME:postgres}
%pgvector.quarkus.datasource.password=${PGVECTOR_DB_PASSWORD:postgres}
%pgvector.quarkus.datasource.jdbc.url=${PGVECTOR_DB_URL:jdbc:postgresql://localhost:5432/agencia_viagem_ai}
%pgvector.quarkus.datasource.jdbc.max-size=8

# --- ConfiguraÓÐo do Embedding Model ---
%pgvector.quarkus.langchain4j.ollama.embedding-model.model-id=nomic-embed-text

%pgvector.quarkus.langchain4j.pgvector.register-vector-pg-extension=true
%pgvector.quarkus.langchain4j.pgvector.dimension=768
%pgvector.quarkus.langchain4j.pgvector.table=travel_embeddings
%pgvector.quarkus.langchain4j.pgvector.drop-table-first=true

# --- ConfiguraÓÐo de Logging do LangChain4j ---
# Loga a requisiÓÐo completa enviada para o LLM (incluindo o manifesto de Tools)
quarkus.langchain4j.log-requests=true
# Loga a resposta completa recebida do LLM (incluindo a chamada de Tool)
quarkus.langchain4j.log-responses=true




