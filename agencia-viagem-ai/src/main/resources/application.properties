# Opcional: configuracao Ollama (ative se quiser alternar)
quarkus.langchain4j.ollama.base-url=http://localhost:11434
quarkus.langchain4j.ollama.chat-model.model-id=llama3.2
quarkus.langchain4j.ollama.timeout=120s

# Easy RAG: usa arquivos em src/main/resources/rag via classpath
quarkus.langchain4j.easy-rag.path=rag
quarkus.langchain4j.easy-rag.path-type=classpath
quarkus.langchain4j.easy-rag.reuse-embeddings.enabled=true

# criar chunks mais focados
quarkus.langchain4j.easy-rag.max-segment-size=100
quarkus.langchain4j.easy-rag.max-overlap-size=20
