# Porta do Servidor MCP (Evita conflito com o Agente na 8080)
quarkus.http.port=8080

# Opcional: configuracao Ollama (ative se quiser alternar)
quarkus.langchain4j.ollama.base-url=http://localhost:11434
quarkus.langchain4j.ollama.chat-model.model-id=llama3.2
# Define um timeout para a chamada.
# Se o modelo demorar mais de 60s para responder, a chamada falharß.
quarkus.langchain4j.ollama.timeout=60s

# --- Configurań§es do EasyRAG (desativadas) ---
# quarkus.langchain4j.easy-rag.path=src/main/resources/rag
# quarkus.langchain4j.easy-rag.max-segment-size=100
# quarkus.langchain4j.easy-rag.max-overlap-size=20
# Perfil opcional para ativar pgvector sem quebrar o fluxo atual padrao.
# Execute com: .\mvnw.cmd -Ppgvector quarkus:dev -Dquarkus.profile=pgvector
%pgvector.quarkus.datasource.db-kind=postgresql
%pgvector.quarkus.datasource.username=${PGVECTOR_DB_USERNAME:postgres}
%pgvector.quarkus.datasource.password=${PGVECTOR_DB_PASSWORD:postgres}
%pgvector.quarkus.datasource.jdbc.url=${PGVECTOR_DB_URL:jdbc:postgresql://localhost:5432/agencia_viagem_ai}
%pgvector.quarkus.datasource.jdbc.max-size=8

# --- ConfigurańŃo do Embedding Model ---
quarkus.langchain4j.ollama.embedding-model.model-id=nomic-embed-text

# --- ConfigurańŃo do PgVector ---
# A dimensŃo do vetor DEVE corresponder Ó do seu EmbeddingModel. O modelo 'nomic-embed-text' usa vetores de 768 dimens§es.
quarkus.langchain4j.pgvector.register-vector-pg-extension=true
quarkus.langchain4j.pgvector.dimension=768
quarkus.langchain4j.pgvector.table=travel_embeddings
quarkus.langchain4j.pgvector.drop-table-first=true


# --- ConfigurańŃo de Logging do LangChain4j ---
# Loga a requisińŃo completa enviada para o LLM (incluindo o manifesto de Tools)
quarkus.langchain4j.log-requests=true

# Loga a resposta completa recebida do LLM (incluindo a chamada de Tool)
quarkus.langchain4j.log-responses=true

# Define um cliente chamado "booking-server"
quarkus.langchain4j.mcp.booking-server.transport-type=http
quarkus.langchain4j.mcp.booking-server.url=http://localhost:8081/mcp/sse/

# Timeout generoso para garantir que o handshake funcione
quarkus.langchain4j.mcp.booking-server.timeout=30s

# Logs para ver o processo acontecer
quarkus.langchain4j.mcp.booking-server.log-requests=true
quarkus.langchain4j.mcp.booking-server.log-responses=true

