services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: agencia-viagem-pgvector
    restart: unless-stopped
    environment:
      POSTGRES_DB: agencia_viagem_ai
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d agencia_viagem_ai"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 5s

