global:
  scrape_interval: 15s
  evaluation_interval: 15s

alerting:
  alertmanagers:
    - static_configs:
        - targets: []

rule_files: []

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'jaeger'
    static_configs:
      - targets: ['jaeger:14269']

  - job_name: 'quarkus'
    static_configs:
      - targets: ['quarkus-app:8080']
    metrics_path: '/q/metrics'
    scrape_interval: 10s
    scrape_timeout: 5s

