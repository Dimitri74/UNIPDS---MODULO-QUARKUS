version: '3.8'

services:
  # Jaeger - Distributed Tracing
  jaeger:
    image: jaegertracing/all-in-one:latest
    container_name: jaeger
    environment:
      - COLLECTOR_OTLP_ENABLED=true
      - COLLECTOR_GRPC_PORT=4317
      - COLLECTOR_HTTP_PORT=4318
    ports:
      # Jaeger UI
      - "16686:16686"
      # OTLP gRPC receiver
      - "4317:4317"
      # OTLP HTTP receiver
      - "4318:4318"
      # Zipkin compact thrift
      - "6831:6831/udp"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:14269/"]
      interval: 5s
      timeout: 1s
      retries: 5
      start_period: 10s
    networks:
      - otel-network

  # Prometheus - Métricas (opcional)
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-storage:/prometheus
    ports:
      - "9090:9090"
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    networks:
      - otel-network
    depends_on:
      - jaeger

  # Grafana - Visualização (opcional)
  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_SECURITY_ADMIN_USER=admin
    ports:
      - "3000:3000"
    volumes:
      - grafana-storage:/var/lib/grafana
    networks:
      - otel-network
    depends_on:
      - prometheus

  # Nota: A aplicação Quarkus deve rodar localmente com:
  # ./mvnw clean compile quarkus:dev

volumes:
  prometheus-storage:
  grafana-storage:

networks:
  otel-network:
    driver: bridge

