# Configuraçőes de Produçăo

# OpenTelemetry - Produçăo
quarkus.otel.enabled=true
quarkus.otel.service.name=unipds-quarkus-api
quarkus.otel.service.version=1.0.0

# Traços com sampling parentbased (apenas traces importantes)
quarkus.otel.traces.sampler=parentbased_traceidratio
quarkus.otel.traces.sampler.arg=0.1

# Exportador OTLP (ajustar endpoint para produçăo)
quarkus.otel.exporter.otlp.endpoint=https://otel-collector.seu-dominio.com
quarkus.otel.exporter.otlp.protocol=grpc
quarkus.otel.exporter.otlp.timeout=30000

# Métricas
quarkus.otel.metrics.exporter=otlp
quarkus.otel.exporter.otlp.metrics.protocol=grpc
quarkus.otel.metrics.exporter.interval=60000

# Batch Span Processor
quarkus.otel.bsp.export.timeout=30000
quarkus.otel.bsp.max.queue.size=512
quarkus.otel.bsp.max.export.batch.size=256
quarkus.otel.bsp.schedule.delay=5000

# Atributos de recurso
quarkus.otel.resource.attributes=environment=production,region=br-sp,team=backend

# Logging
quarkus.log.level=INFO
quarkus.log.category."io.opentelemetry".level=WARN
quarkus.log.category."io.quarkus".level=INFO

