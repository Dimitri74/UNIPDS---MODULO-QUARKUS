# Desabilitar Dev Services (nŃo tenta iniciar PostgreSQL via Docker)
quarkus.devservices.enabled=false
quarkus.datasource.devservices.enabled=false

# ConfigurańŃo REST Client para Star Wars API (Quarkus 3.x)
quarkus.rest-client."org.unipds.service.StarWarsService".url=https://swapi.dev/api
quarkus.rest-client."org.unipds.service.StarWarsService".scope=jakarta.inject.Singleton

# Habilitar logs do REST Client para debug
quarkus.log.category."org.jboss.resteasy.reactive.client".level=DEBUG
