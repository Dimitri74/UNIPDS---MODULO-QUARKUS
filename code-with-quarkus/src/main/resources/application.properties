# Desabilitar Dev Services (năo tenta iniciar PostgreSQL via Docker)
# quarkus.devservices.enabled=false
# quarkus.datasource.devservices.enabled=false

# Configuraçăo DataSource para H2 (em memória para testes/dev)
quarkus.datasource.db-kind=h2
quarkus.datasource.jdbc.url=jdbc:h2:mem:test
quarkus.hibernate-orm.database.generation=drop-and-create

# Configuraçăo REST Client para Star Wars API (Quarkus 3.x)
quarkus.rest-client."org.unipds.service.StarWarsService".url=https://swapi.dev/api
quarkus.rest-client."org.unipds.service.StarWarsService".scope=jakarta.inject.Singleton

# Habilitar logs do REST Client para debug
quarkus.log.category."org.jboss.resteasy.reactive.client".level=DEBUG

# propriedades segurança
mp.jwt.verify.publickey.location=https://raw.githubusercontent.com/eldermoraes/unipds/main/jwt-token/quarkus.jwt.pub
mp.jwt.verify.issuer=https://quarkus.io/using-jwt-rbac

# Mapear claim 'groups' para roles
quarkus.smallrye-jwt.claims.groups.path=groups

# ======================== OpenTelemetry Configuration ========================
# Habilitar OpenTelemetry
quarkus.otel.enabled=true

# Identificaçăo do serviço
quarkus.otel.service.name=unipds-quarkus-api
quarkus.otel.service.version=1.0.0

# Configuraçăo de Traços (Tracing) - Usando gRPC (padrăo)
quarkus.otel.traces.exporter=otlp
quarkus.otel.exporter.otlp.traces.endpoint=http://localhost:4317
quarkus.otel.exporter.otlp.traces.protocol=grpc

# Sampler - sempre coletar traces (mudar para 'parentbased_always_on' em produçăo com filtros)
quarkus.otel.traces.sampler=always_on
quarkus.otel.traces.sampler.arg=1.0

# Configuraçăo de Métricas - Usando gRPC (padrăo)
quarkus.otel.metrics.exporter=otlp
quarkus.otel.exporter.otlp.metrics.endpoint=http://localhost:4317
quarkus.otel.exporter.otlp.metrics.protocol=grpc
quarkus.otel.metrics.exporter.interval=1000

# Configuraçăo de Logs (opcional)
quarkus.otel.logs.exporter=none

# Atributos de recursos (contexto do serviço)
quarkus.otel.resource.attributes=environment=development,region=br-sp,team=backend

# Atributos de servidor
quarkus.otel.bsp.export.timeout=30000
quarkus.otel.bsp.max.queue.size=2048
quarkus.otel.bsp.schedule.delay=5000

# Logs
quarkus.log.level=INFO
quarkus.log.category."io.opentelemetry".level=INFO

